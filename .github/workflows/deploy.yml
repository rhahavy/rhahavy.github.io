# -----------------------------------------------------------------------------
# GitHub Pages deployment — static single-file site.
# Uploads index.html + public assets to Pages. No build step needed.
# -----------------------------------------------------------------------------
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        # Copy index.html + everything in /public to a deploy folder.
        run: |
          mkdir -p _site
          cp index.html _site/
          if [ -d public ]; then cp -r public/. _site/; fi
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
