# -----------------------------------------------------------------------------
# GitHub Pages deployment workflow.
# Builds the Vite site in CI, then publishes the /dist folder to GitHub Pages.
# Triggers: every push to `main` (plus a manual "Run workflow" button in GitHub).
# -----------------------------------------------------------------------------
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages needs these permissions to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; queue the rest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
